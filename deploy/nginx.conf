server {
    listen 80;
    server_name mafdet.ai www.mafdet.ai;

    # HTTP 重定向到 HTTPS（certbot 申请证书后自动启用）
    # return 301 https://$host$request_uri;

    # ─── 后端 API 反向代理 ────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # WebSocket 支持
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';

        # 传递真实客户端信息
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # AI 工作流任务耗时较长，超时设置为 10 分钟
        proxy_read_timeout 600s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;

        # 关闭缓冲，确保流式响应实时传递
        proxy_buffering off;
    }

    # ─── 前端静态文件服务 ─────────────────────────────────────────────────────
    location / {
        root /var/www/mafdet-ai/web-dist;
        index index.html;

        # SPA 路由：所有路径回退到 index.html
        try_files $uri $uri/ /index.html;

        # 静态资源长期缓存
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ─── 安全响应头 ───────────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 日志
    access_log /var/log/nginx/mafdet-ai.access.log;
    error_log  /var/log/nginx/mafdet-ai.error.log;
}
